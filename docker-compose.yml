services:
  # ==========================================================================
  # Laravel Application (PHP-FPM + Queue Worker via Supervisor)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: procontact-app
    restart: unless-stopped
    volumes:
      - app-storage:/var/www/html/storage
    environment:
      - APP_ENV=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - procontact

  # ==========================================================================
  # Nginx Web Server
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: procontact-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - procontact

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: procontact-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-agenda_app}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - procontact

volumes:
  db-data:
    driver: local
  app-storage:
    driver: local
  app-public:
    driver: local

networks:
  procontact:
    driver: bridge
