services:
  app:
    image: ghcr.io/netrunner0101/procontact_final_v13:${IMAGE_TAG:-production-latest}
    restart: unless-stopped
    env_file: .env
    networks: [proxy, internal]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage/app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.production.rule=Host(`procontact.be`)"
      - "traefik.http.routers.production.tls.certresolver=letsencrypt"
      - "traefik.http.services.production.loadbalancer.server.port=80"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-procontact_production}
      POSTGRES_USER: ${DB_USERNAME:-procontact}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata-production:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    image: ghcr.io/netrunner0101/procontact_final_v13:${IMAGE_TAG:-production-latest}
    command: php artisan queue:work --sleep=3 --tries=3
    restart: unless-stopped
    env_file: .env
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    image: ghcr.io/netrunner0101/procontact_final_v13:${IMAGE_TAG:-production-latest}
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    restart: unless-stopped
    env_file: .env
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata-production:
  app-storage:

networks:
  proxy:
    external: true
  internal:
