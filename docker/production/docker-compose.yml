services:
  app:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: ghcr.io/netrunner0101/procontact_final_v13:${IMAGE_TAG:-latest}
    container_name: procontact-${ENV:-staging}-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-80}:80"
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage/app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-procontact}
      POSTGRES_USER: ${DB_USERNAME:-procontact}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: ghcr.io/netrunner0101/procontact_final_v13:${IMAGE_TAG:-latest}
    command: php artisan queue:work --sleep=3 --tries=3
    restart: unless-stopped
    env_file: .env
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile
    image: ghcr.io/netrunner0101/procontact_final_v13:${IMAGE_TAG:-latest}
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    restart: unless-stopped
    env_file: .env
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  app-storage:

networks:
  internal:
