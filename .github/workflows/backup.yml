name: Daily Database Backup

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3:00 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  backup:
    name: Backup Databases
    runs-on: ubuntu-latest

    steps:
      - name: Backup via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            BACKUP_DIR=/opt/procontact/backups
            mkdir -p $BACKUP_DIR

            # Production backup
            docker compose -f /opt/procontact/production/docker-compose.production.yml exec -T db \
              pg_dump -U procontact procontact_production \
              | gzip > $BACKUP_DIR/production-$TIMESTAMP.sql.gz

            # Staging backup
            docker compose -f /opt/procontact/staging/docker-compose.staging.yml exec -T db \
              pg_dump -U procontact procontact_staging \
              | gzip > $BACKUP_DIR/staging-$TIMESTAMP.sql.gz

            # Cleanup backups older than 30 days
            find $BACKUP_DIR -name "*.sql.gz" -mtime +30 -delete

            echo "Backups completed: production-$TIMESTAMP.sql.gz, staging-$TIMESTAMP.sql.gz"
