name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Staging image tag to promote (e.g. staging-a1b2c3d)'
        required: true
      reason:
        description: 'Release note'
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy → Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Promote image tag
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          docker tag  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} \
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/procontact/production

            # Pre-deploy database backup
            docker compose exec -T postgres \
              pg_dump -U procontact ${DB_DATABASE:-procontact_production} \
              | gzip > /opt/procontact/backups/pre-deploy-$(date +%Y%m%d%H%M%S).sql.gz

            # Pull and deploy
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE_TAG=production-latest docker compose pull app queue scheduler
            IMAGE_TAG=production-latest docker compose up -d \
              --no-deps \
              --remove-orphans \
              app queue scheduler

            # Wait for app to be up (max 30s)
            timeout 30 sh -c 'until docker compose exec -T app php artisan --version; do sleep 2; done'

            # Run migrations safely
            docker compose exec -T app php artisan migrate --force

            # Cleanup old images
            docker image prune -f

            echo "Production deploy done — ${{ inputs.image_tag }}"
